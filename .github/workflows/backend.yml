name: Backend

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:
  workflow_dispatch:

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d github_actions"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/github_actions
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/github_actions
      SECRET_KEY: ci-secret-key-at-least-thirty-two-characters-long
      JWT_SECRET_KEY: ci-jwt-secret-key-at-least-thirty-two-chars-long
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/2
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
      AUDIT_LOG_BUFFER_ENABLED: "false"
      FRONTEND_PUBLIC_URL: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WeasyPrint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
